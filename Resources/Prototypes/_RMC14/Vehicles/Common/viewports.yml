- type: entity
  abstract: true
  id: VehicleVanInteriorBase
  name: van interior piece
  description: A decorative interior piece for the van.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  # - type: Sprite
  #   sprite: _RMC14/Structures/Vehicles/Interiors/van.rsi
  #   drawdepth: Overdoors
  # - type: InteractionTransparency
# imp, removed van files so just put van interior here please do something later TODO TODO 2x

- type: entity
  parent: VehicleVanInteriorBase
  id: VehicleViewport
  name: vehicle viewport
  description: A small viewport for peering outside.
  placement:
    mode: PlaceFree
  components:
  - type: WallMount
    arc: 360
  - type: Sprite
    sprite: _RMC14/Structures/Vehicles/Interiors/general.rsi
    state: viewport
    drawdepth: Overdoors
  - type: Clickable
  - type: InteractionOutline
  # - type: RMCIgnoreGhostInteractionLimits
  - type: VehicleViewport
  # - type: RemoveComponents
  #   components:
  #   - type: InteractionTransparency

- type: entity
  parent: VehicleViewport
  id: VehicleViewportUnanchored
  name: vehicle viewport (unanchored)
  description: A small viewport for peering outside.
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false

