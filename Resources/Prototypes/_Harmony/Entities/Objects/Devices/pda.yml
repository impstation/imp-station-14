## ERP Special Forces
- type: entity
  parent: ClownPDA
  id: ERPLeaderPDA
  name: ERP Leader PDA
  suffix: Harmony
  description: Only given out to the most elite of the Nanotrasen clown forces.
  components:
  - type: Pda
    id: ERPLeaderIDCard
  # Imp Change Start -> Looks like ERT, Is Clown
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda-ert
  - type: PdaBorderColor
    borderColor: "#A32D26"
    accentHColor: "#447987"
    accentVColor: "#447987"
  - type: Icon
    state: pda-ert
  # Imp Change End

- type: entity
  parent: ClownPDA
  id: ERPClownPDA
  name: ERP Clown PDA
  suffix: Harmony
  description: Given to clowns part of the elite Emergency Response Party.
  components:
  - type: Pda
    id: ERPClownIDCard
  # Imp Change Start -> Looks like ERT, Is Clown
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda-ert
  - type: PdaBorderColor
    borderColor: "#A32D26"
    accentHColor: "#447987"
    accentVColor: "#447987"
  - type: Icon
    state: pda-ert
  # Imp Change End
