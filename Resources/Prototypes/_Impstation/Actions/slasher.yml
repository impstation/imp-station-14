# Slasher hotbar actions

- type: entity
  parent: BaseAction
  id: ActionSlasherGainShroud
  name: slasher-action-gain-shroud-name
  description: slasher-action-gain-shroud-desc
  components:
  - type: Action
    itemIconStyle: NoItem
    raiseOnAction: true
    icon: # Placeholder icon - use chameleon implant sprite until a dedicated Slasher icon exists
      sprite: Actions/Implants/implants.rsi
      state: chameleon
    useDelay: 120
    startDelay: true
  - type: InstantAction
    event: !type:SlasherGainShroudEvent
  - type: SlasherShroudAction
    bleedAmount: 2
    bleedReapplyDelay: 3
    bleedCapRatio: 0.5
    movementVisibilityRate: .05
    minVisibility: -1

- type: entity
  parent: BaseAction
  id: ActionSlasherRend
  name: slasher-action-rend-name
  description: slasher-action-rend-desc
  components:
  - type: Action
    itemIconStyle: NoItem
    raiseOnAction: true
    icon: Interface/Actions/harm.png # Placeholder icon — replace with a dedicated Slasher rend icon
    useDelay: 90
    startDelay: true
  - type: TargetAction
    range: 1.5
    checkCanAccess: false # allow targeting structures that block normal line-of-sight
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - Door
      tags:
      - Wall
      - Window
    event: !type:SlasherRendEvent
  - type: SlasherRendAction
    rendDelay: 5
    distanceThreshold: 1.5
    rendStartSound:
      path: /Audio/Machines/airlock_creaking.ogg
    rendCompleteSound:
      collection: MetalCrunch
    windowRendCompleteSound:
      collection: GlassBreak
    rendDamage:
      types:
        Structural: 9999

- type: entity
  parent: BaseAction
  id: ActionSlasherLoseShroud
  name: slasher-action-lose-shroud-name
  description: slasher-action-lose-shroud-desc
  components:
  - type: Action
    itemIconStyle: NoItem
    raiseOnAction: true
    icon: # Placeholder icon - use chameleon implant sprite until a dedicated Slasher icon exists
      sprite: Actions/Implants/implants.rsi
      state: chameleon
    useDelay: 5
  - type: InstantAction
    event: !type:SlasherLoseShroudEvent
  - type: SlasherUnshroudAction

- type: entity
  parent: BaseAction
  id: ActionSlasherPlaceMeathook
  name: slasher-action-place-meathook-name
  description: slasher-action-place-meathook-desc
  components:
  - type: LimitedCharges
    maxCharges: 2
  - type: Action
    itemIconStyle: BigAction
    raiseOnAction: true
    useDelay: 10
    icon:
      sprite: Structures/meat_spike.rsi
      state: spike
  - type: TargetAction
    checkCanAccess: false
    range: 0
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - MapGrid
  - type: WorldTargetAction
    event: !type:SlasherPlaceMeathookEvent

