- type: entity
  parent: BaseMentalAction # allow reading laws when crit
  id: ActionOpenCartridges
  name: Open Programs
  description: View software installed on you
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: Interface/Actions/actions_borg.rsi
      state: state-laws
    useDelay: 0.5
  - type: InstantAction
    event: !type:TogglePdaScreenEvent

- type: entity
  parent: BaseMentalAction
  id: ActionAccessPDA
  name: Access PDA
  description: Open connected PDA
  components:
  - type: Action
    itemIconStyle: BigItem
    icon:
      sprite: Interface/Actions/actions_borg.rsi
      state: state-laws
    useDelay: 0.5
  - type: InstantAction
    event: !type:AltAccessPdaScreenEvent

- type: entity
  parent: BaseMentalAction
  id: ActionAllowBorgingToggle
  name: Accept Cyborg Contract
  description: Toggle acceptance of the standard Nanotrasen borgification contract for disembodied employees.
  components:
  - type: Action
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: state-laws }
    iconOn: { sprite: _Impstation/Interface/Actions/actions_borg.rsi, state: state-laws-accepted }
    itemIconStyle: NoItem
    useDelay: 1
  - type: InstantAction
    event: !type:ToggleBorgContractEvent

- type: entity
  parent: BaseMentalAction
  id: ActionDisconnect
  name: Hibernate
  description: "Log off! WARNING: THIS CANNOT BE UNDONE."
  components:
  - type: Action
    icon: { sprite: _Impstation/Interface/Actions/actions_borg.rsi, state: hibernate }
    itemIconStyle: NoItem
    useDelay: 1
  - type: ConfirmableAction
    popup: borg-hibernation-confirm-popup
  - type: InstantAction
    event: !type:BorgBrainHibernationEvent
