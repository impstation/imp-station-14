- type: entity
  parent: BaseGameRule
  id: ThiefSingular # spawns One thief. be careful when running, this will just apply Pacified to one person in the middle of the round
  components:
  - type: ThiefRule
  - type: AntagObjectives
    objectives:
    - EscapeThiefShuttleObjective
  - type: AntagRandomObjectives
    sets:
    - groups: ThiefBigObjectiveGroups
      prob: 0.7
      maxPicks: 1
    - groups: ThiefObjectiveGroups
      maxPicks: 10
    maxDifficulty: 2.5
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    agentName: thief-round-end-agent-name
    definitions:
    - prefRoles: [ Thief ]
      max: 1
      playerRatio: 1 # we just want One
      lateJoinAdditional: true
      allowNonHumans: true
      multiAntagSetting: NotExclusive
      startingGear: ThiefGear
      components:
      - type: Pacified
      - type: Thieving
        stripTimeReduction: 2
        stealthy: true
      mindRoles:
      - MindRoleThief
      briefing:
        sound: "/Audio/Misc/thief_greeting.ogg"

- type: entity
  parent: Slasher
  id: SlasherSubgamemode
  components:
  - type: GameRule
    minPlayers: 20
    maxPlayers: 100
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ Slasher ]
      min: 1
      max: 1
      playerRatio: 35
      spawnerPrototype: SpawnPointLocationSlasherShuttle
      startingGear: SlasherGear
      components:
      - type: FlashWeakness
      - type: CombatModeSprint
        sprintCoefficient: 0.8
      - type: Clumsy
        clumsyHypo: false
        clumsyVaulting: false
        clumsyDefib: false
      - type: OnDeathEntitySpawn
        entityPrototype: ShadowKudzu
        radius: 1
      - type: NoGhoul
      - type: NoSacrifice
      - type: SlasherRole
        actions:
        - ActionSlasherGainShroud
        - ActionSlasherRend
        - ActionSlasherPlaceEffigy
        - ActionSlasherDarkStep
        - ActionSlasherDarkHeal
        - ActionSlasherWeaponRecall
      - type: SlasherEffigyLocator
      - type: ZombieImmune
      - type: AntagImmune
      - type: SlasherShroud
      - type: SlasherCombatLight
      - type: SlasherCombatHeartbeat
        beatInterval: 1.2
        heartbeatSound:
          path: /Audio/_Goobstation/Heretic/heartbeat.ogg
      - type: Prying
        pryPowered: true
        force: true
        speedModifier: 1.0
        useSound:
          path: /Audio/Items/crowbar.ogg
      mindRoles:
      - MindRoleSlasher
      briefing:
        text: slasher-role-greeting
        color: Crimson
        guides:
        - Slasher
        sound:
          path: /Audio/Items/Anomaly/shadow_crit.ogg
          params:
            volume: -3 # If you set this to 0 it will be so loud you get a headache
