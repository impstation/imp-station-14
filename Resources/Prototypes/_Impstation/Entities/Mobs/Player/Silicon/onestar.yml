- type: entity
  name: onestar mecha
  id: Onestar
  description: A gigantic mech. You should really be shooting at it.
  parent: PlayerSiliconBase
  suffix: Boss, Ghost Role
  components:
  - type: Loadout # imp special. this replaces the InnateTool component.
    prototypes:
      - StartingGearOnestarWeapons
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: GhostRole
    makeSentient: true
    name: ghost-role-information-onestar-mecha-name
    description: ghost-role-information-onestar-mecha-description
    rules: ghost-role-information-antagonist-rules
    mindRoles: # imp. if it matters.
    - MindRoleGhostRoleSiliconAntagonist
  - type: GhostTakeoverAvailable
  - type: MovementSpeedModifier
    baseWalkSpeed : 3
    baseSprintSpeed : 2
  - type: MobState
    allowedStates:
      - Alive
      - Dead
  - type: MobThresholds # imp 1000 > 2000
    thresholds:
      0: Alive
      2000: Dead
  - type: Sprite
    drawdepth: Mobs
    layers:
    - state: onestar_boss
      sprite: Mobs/Silicon/onestar.rsi
    - state: onestar_boss_screen
      sprite: Mobs/Silicon/onestar.rsi
      shader: unshaded
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/sound_mecha_powerloader_step.ogg
  - type: MovementIgnoreGravity
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 1
        density: 160
        mask:
        - LargeMobMask
        layer:
        - MobLayer
  - type: Appearance
  - type: CombatMode
  - type: Tag
    tags:
      - FootstepSound
  - type: NpcFactionMember # imp
    factions:
    - AllHostile
  - type: HTN # imp
    rootTask:
      task: SimpleRangedHostileCompound
    blackboard:
      NavSmash: !type:Bool
        true
  - type: Destructible # imp
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 2000
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: OnestarDeath
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Hands
    showInHands: false
    canBeStripped: false
    showExamine: false
    activeHandId: hand1
    hands:
      hand1:
        location: Middle
      hand2:
        location: Middle
      hand3:
        location: Middle
      hand4:
        location: Middle
    sortedHands: 
    - hand1
    - hand2
    - hand3
    - hand4