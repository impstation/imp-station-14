- type: entity
  name: BROS
  parent: [ MobCombat, SimpleMobBase ]
  id: MobBros
  description: OH FUCK IT'S BROS
  components:
  - type: VentCrawler
    enterDelay: 1
  - type: Item
    size: Tiny
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: bros
      sprite: _Impstation/Mobs/Animals/bros.rsi
  - type: Butcherable
    spawned:
    - id: FoodLingzhi
      amount: 1
  - type: NpcFactionMember
    factions:
    - Xeno
  - type: InputMover
  - type: MobMover
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 130
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: DamageStateVisuals
    states:
      Alive:
        Base: bros
      Dead:
        Base: bros-dead
  - type: MobThresholds
    thresholds:
      0: Alive
      15: Dead
  - type: MeleeWeapon
    altDisarm: false
    angle: 0
    animation: WeaponArcPunch
    soundHit:
      path: /Audio/_Impstation/Animals/bros_hit.ogg
    damage:
      types:
        Blunt: 1
  - type: ReplacementAccent
    accent: bros
  - type: Speech
    speechSounds: Bros
    speechVerb: Bros
  - type: Vocal
    sounds:
      Male: Bros
      Female: Bros
      Unsexed: Bros
    wilhelmProbability: 0.001
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/_Impstation/Animals/bros_hurt.ogg
      params:
        variation: 0.125
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: VentCrud
        Quantity: 15
  - type: NoSlip
  - type: ZombieImmune
  - type: Edible
  - type: GoobAbsorbable # bros bite sized
    biomassRestored: 0.05
  - type: Extractable
    grindableSolutionName: food
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: VentCrud
          Quantity: 2
        - ReagentId: GroundBros
          Quantity: 3
  - type: NPCRetaliation
  - type: Tag
    tags:
    - BROS
    - Trash
    - MultitoolDefibrillatorTarget
    - KodeEdible
  - type: FoodSequenceElement
    entries:
      Burger: BrosBurger
      Hotdog: BrosBurger
  - type: CanEscapeInventory
    baseResistTime: 2
  - type: AlwaysRevolutionaryConvertible #imp

- type: entity
  name: SORB
  parent: MobBros
  id: MobSorb
  description: SORB S'TI KCUF HO
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: sorb
      sprite: _Impstation/Mobs/Animals/bros.rsi
  - type: DamageStateVisuals
    states:
      Alive:
        Base: sorb
      Dead:
        Base: sorb-dead

- type: entity
  name: BROSer
  parent: MobBros
  id: MobBroser
  description:  MORE BROS THAN YOU COULD EVER HANDLE
  components:
  - type: Item
    size: Large
  - type: Sprite
    drawdepth: Mobs
    sprite:  _Impstation/Mobs/Animals/broser.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: broser
  - type: DamageStateVisuals
    states:
      Alive:
        Base: broser
      Critical:
        Base: critical
      Dead:
        Base: dead
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Critical
      200: Dead
  - type: Butcherable
    spawned:
    - id: FoodLingzhi
      amount: 4
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 4
        Structural: 100
  - type: GhostRole
    makeSentient: true
    name: ghost-role-information-broser-name
    description: ghost-role-information-broser-description
    rules: ghost-role-information-antagonist-rat-king-rules
    mindRoles:
    - MindRoleGhostRoleSoloAntagonist
    raffle:
      settings: default
  - type: GhostTakeoverAvailable

# used for BROS polymorph from juice that makes you UNGH so players don't get one-shot and die for real
- type: entity
  name: BROS
  parent: MobBros
  id: MobBrosPoly
  suffix: player transformation
  description: OH FUCK IT'S BROS
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Critical
      200: Dead
