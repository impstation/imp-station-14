- type: entity
  parent: [ SimpleSpaceMobBase, StripableInventoryBase ]
  id: MobZombieExecration
  name: execration
  description: A bottomless appetite and an insatiable bloodlust... you better start running.
  components:
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: ghost-role-information-zombie-name
    description: ghost-role-information-zombie-description
    rules: ghost-role-information-antagonist-rules
    raffle:
      settings: default
  - type: GhostTakeoverAvailable
  - type: NpcFactionMember
    factions:
    - Zombie
  - type: Zombie
  - type: Inventory
    speciesId: human
  - type: StatusEffects
    allowed:
    - Electrocution
    - TemporaryBlindness
    - Pacified
    - Flashed
    - RadiationProtection
    - Adrenaline
  - type: Sprite
    drawdepth: Mobs
    sprite: _Impstation/Mobs/Demons/execration.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: execration
    - map: ["jumpsuit"]
    - map: [ "gloves" ]
    - map: [ "shoes" ]
    - map: [ "ears" ]
    - map: [ "eyes" ]
    - map: [ "belt" ]
    - map: [ "id" ]
    - map: [ "outerClothing" ]
    - map: [ "back" ]
    - map: [ "neck" ]
    - map: [ "mask" ]
    - map: [ "head" ]
    - map: [ "pocket1" ]
    - map: [ "pocket2" ]
    - map: [ "clownedon" ] # Dynamically generated
      sprite: "Effects/creampie.rsi"
      state: "creampie_human"
      visible: false
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: GenericVisualizer
    visuals:
      enum.CreamPiedVisuals.Creamed:
        clownedon: # Not 'creampied' bc I can already see Skyrat complaining about conflicts.
          True: {visible: true}
          False: {visible: false}
  - type: CreamPied
  - type: Deathgasp
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepSlime
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 185
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: FloorOcclusion
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Dead
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Voice/Misc/lowHiss3.ogg
      params:
        loop: False
        variation: 0.125
        volume: 20
  - type: MovementSpeedModifier
    baseWalkSpeed: 1
    baseSprintSpeed: 1.5
  - type: Butcherable
    spawned:
    - id: FoodMeatRotten
      amount: 1
  - type: GoobAbsorbable
    biomassRestored: 0.5
  - type: Bloodstream
    bloodlossThreshold: 0
    bloodReferenceSolution:
      reagents:
      - ReagentId: ZombieBlood
        Quantity: 50
      - ReagentId: Romerol
        Quantity: 5
      - ReagentId: UnstableMutagen
        Quantity: 25
      - ReagentId: Radium
        Quantity: 25
      - ReagentId: VentCrud
        Quantity: 20
  - type: ReplacementAccent
    accent: genericAggressive
  - type: EmoteOnDamage
    emotes: ['Scream']
  - type: AutoEmote
    emotes: ['ZombieGroan']
  - type: Speech
    speechSounds: Bass
  - type: Vocal
    sounds:
      Unsexed: Bear
  - type: CombatMode
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Zombie
  - type: Prying
    pryPowered: true
    force: true
    speedModifier: 0.75
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: RotationVisuals
    defaultRotation: 90
    horizontalRotation: 90
  - type: StandingState
  - type: Crawler
  - type: Climbing
  - type: VentCrawler
    enterDelay: 4
  - type: MeleeWeapon
    soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    angle: 0
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 23
        Structural: 10
  - type: NightVision
    isActive: true
    toggleAction: null
    color: "#9d2742"
    activateSound: null
    deactivateSound: null
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound

- type: entity
  parent: MobZombieExecration
  id: MobZombieExecrationCommon
  name: execration
  suffix: common
  description: A bottomless appetite and an insatiable bloodlust... you better start running.
  components:
  - type: Loadout
    prototypes: [ ZombieBotany, ZombieCargo, ZombieCivilian1, ZombieCivilian2, ZombieCourier, ZombieEngineer, ZombieMedical1, ZombieMedical2, ZombieScience1, ZombieScience2, ZombieService ]

- type: entity
  parent: MobZombieExecration
  id: MobZombieExecrationUncommon
  name: execration
  suffix: uncommon
  description: A bottomless appetite and an insatiable bloodlust... you better start running.
  components:
  - type: Loadout
    prototypes: [ ZombieAtmos, ZombieJanitor, ZombieClown, ZombieSalvage, ZombieSecurity ]

- type: entity
  parent: MobZombieExecration
  id: MobZombieExecrationRare
  name: execration
  suffix: rare
  description: A bottomless appetite and an insatiable bloodlust... you better start running.
  components:
  - type: Loadout
    prototypes: [ ZombieCaptain1, ZombieCaptain2, ZombieSyndicate1, ZombieSyndicate2, ZombiePirate1, ZombiePirate2, ZombieIntern, ZombieCultist, ZombieMascot ]
