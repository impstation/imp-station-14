#========================================================================

- type: entity
  name: baby cow
  parent: MobCow
  id: MobCowBaby
  description: Moo. But smaller.
  components:
  - type: ImpReproductive
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 100
  - type: ImpInfant
    nextStage: MobCow
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 2
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: cow
      sprite: _Impstation/Mobs/Animals/Livestock/cow_infant.rsi

- type: entity
  name: bull
  parent: SimpleMobBase
  id: MobBull
  description: Mooscle.
  components:
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 300
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: bull
      sprite: _Impstation/Mobs/Animals/Livestock/bull.rsi
  - type: Tag
    tags:
    - DoorBumpOpener
    - Bull
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.40
        density: 400
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: DamageStateVisuals
    states:
      Alive:
        Base: bull
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: ExaminableHunger
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 7
  - type: InteractionPopup
    successChance: 0.7
    interactDelay: 2 # Avoids overlapping SFX due to spam - these SFX are a little longer than the typical 1 second.
    interactSuccessString: petting-success-soft-floofy
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/cow_moo.ogg
  - type: Perishable
    molsPerSecondPerUnitMass: 0.0015
  - type: NpcFactionMember
    factions:
    - Passive
  - type: HTN
    rootTask:
      task: LivestockCompound
  - type: GuideHelp
    guides:
    - Chef
    - FoodRecipes
  - type: GoobAbsorbable
    biomassRestored: 0.7
  - type: CowToolProficiency #this was made for ungus, but i'm putting this here in case an admin wants to be cute and give a cow hands
  - type: AlwaysRevolutionaryConvertible
  - type: Grammar
    attributes:
      gender: male
  - type: ImpReproductive
    hungerPerBirth: 50
    mobType: Bull
    gender: Male

- type: entity
  name: baby bull
  parent: MobBull
  id: MobBullBaby
  description: Mooscle. But smaller.
  components:
  - type: ImpReproductive
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 100
  - type: ImpInfant
    nextStage: MobBull
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 2
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: bull
      sprite: _Impstation/Mobs/Animals/Livestock/bull_infant.rsi

