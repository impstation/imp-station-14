# Visual-only dark teleport marker used by Slasher dark step while channeling.
- type: entity
  id: SlasherDarkTeleportMarker
  name: shade rift
  description: A tear in darkness marking where the slasher will emerge.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Fixtures
  - type: Sprite
    layers:
    - sprite: Structures/Specific/carp_rift.rsi
      state: icon
      color: "#8f5dff"
      shader: unshaded
  - type: PointLight
    enabled: true
    color: "#7b3cf2"
    radius: 3.0
    energy: 2.0
    netsync: false
  - type: TimedDespawn
    lifetime: 4
