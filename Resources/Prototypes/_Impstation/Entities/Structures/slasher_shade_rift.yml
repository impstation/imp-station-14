# Midround antag teleporter variant of the shade rift.
- type: entity
  id: MidroundAntagTeleporter
  name: shade rift
  description: A tear in darkness that drags you elsewhere.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: InteractionOutline
  - type: Clickable
  - type: Sprite
    layers:
    - sprite: Structures/Specific/carp_rift.rsi
      state: icon
      color: "#8f5dff"
      shader: unshaded
  - type: PointLight
    enabled: true
    color: "#7b3cf2"
    radius: 3.0
    energy: 2.0
    netsync: false
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Fixtures
    fixtures:
      portalFixture:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.48,0.25,0.48"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        hard: false
  - type: SlasherRiftTeleport
