- type: entity
  parent: Supermatter
  id: SupermatterNoAnnouncement
  name: supermatter crystal
  description: A strangely translucent and iridescent crystal. It lacks the Nanotrasen integrated delamination detection announcement system.
  suffix: no announcement
  components:
    - type: Speech
      enabled: false
    - type: Supermatter
      suppressAnnouncements: true
    - type: EmitSoundOnSpawn
      sound:
        path: /Audio/Effects/teleport_arrival.ogg

- type: entity
  parent: BaseSupermatter
  id: SupermatterShard
  name: supermatter shard
  description: A strangely translucent and iridescent crystal that looks like it used to be part of a larger structure.
  components:
  - type: Sprite
    sprite: _Impstation/Structures/Power/Generation/Supermatter/supermatter_shard.rsi
    drawdepth: Mobs
    snapCardinals: true
    layers:
    - state: supermatter
      map: [ "enum.SupermatterVisuals.Crystal" ]
    - state: supermatter-psy
      map: [ "enum.SupermatterVisuals.Psy" ]
      color: "#ffffff00"
  - type: SupermatterVisuals
    crystal:
      Normal: { state: supermatter }
      Glow: { state: supermatter-glow }
      GlowEmergency: { state: supermatter-glow }
      GlowDelam: { state: supermatter-glow }
  - type: Explosive
    explosionType: Supermatter
    totalIntensity: 16000
    intensitySlope: 25
    maxIntensity: 100
  - type: GravityWell
    baseRadialAcceleration: 1
    maxRange: 0.5
    gravPulsePeriod: 15
  - type: SinguloFood
    energy: 1000
  - type: Appearance
  - type: Supermatter
    isShard: true
    gasEfficiency: 0.125
  - type: AtmosDevice
    requireAnchored: false
    joinSystem: true
  - type: RadiationSource
  - type: DeviceLinkSource
    ports:
    - SupermatterInactive
    - SupermatterNormal
    - SupermatterCaution
    - SupermatterWarning
    - SupermatterDanger
    - SupermatterEmergency
    - SupermatterDelaminating
  - type: Transform
    anchored: false
    noRot: true
  - type: Pullable
    prevFixedRotation: True
  - type: Physics
    bodyType: Dynamic
