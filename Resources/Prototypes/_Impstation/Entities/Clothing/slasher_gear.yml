  components:
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.65
        Piercing: 0.6
        Heat: 0.7
        Caustic: 0.75
  - type: ExplosionResistance
    damageCoefficient: 0.9

- type: entity
  parent: [ClothingHeadHatCapcap, BaseMajorContraband]
