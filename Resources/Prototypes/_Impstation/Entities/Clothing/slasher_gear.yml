- type: entity
  parent: [ClothingMaskGas, BaseMajorContraband]
  id: ClothingMaskSlasher
  name: slasher's mask
  description: A tactical mask worn by a relentless hunter.
  components:
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9
  - type: ThermalVision
    isEquipment: true
    pulseTime: 2
    toggleAction: PulseThermalVision

- type: entity
  parent: [ClothingHeadsetGrey, BaseMajorContraband]
  id: ClothingHeadsetSlasher
  name: slasher's headset
  description: A slasher's passenger headset.

- type: entity
  parent: [ClothingHandsGlovesCombat, BaseMajorContraband]
  id: ClothingHandsGlovesSlasher
  name: bloody gloves
  description: Black gloves stained with old blood.
  components:
  - type: Fiber
    fiberColor: fibers-red

- type: entity
  parent: [ClothingUniformJumpsuitColorGrey, BaseMajorContraband]
  id: ClothingUniformJumpsuitSlasher
  name: slasher's jumpsuit
  description: A slasher's tattered.

- type: entity
  parent: [ClothingShoesBootsCombat, BaseMajorContraband]
  id: ClothingShoesBootsSlasher
  name: slasher's combat boots
  description: Heavy combat boots built for long hunts.

- type: entity
  parent: [ClothingOuterCoatBomberBlack, BaseMajorContraband]
  id: ClothingOuterCoatSlasher
  name: slasher's coat
