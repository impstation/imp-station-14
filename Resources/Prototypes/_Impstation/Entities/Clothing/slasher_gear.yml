  parent: [ClothingUniformJumpsuitClown, BaseMajorContraband]
  id: ClothingUniformJumpsuitSlasherClown
  name: slasher's clown jumpsuit
  description: A clown-pattern slasher jumpsuit.

- type: entity
  parent: [ClothingOuterCoatSlasher, BaseMajorContraband]
  id: ClothingOuterCoatSlasherClown
  name: slasher's jokester coat
  description: A jokester-styled coat worn by a slasher.
  components:
  - type: Sprite
    sprite: _Impstation/Clothing/OuterClothing/Coats/clown_jokestercoat.rsi
  - type: Clothing
    sprite: _Impstation/Clothing/OuterClothing/Coats/clown_jokestercoat.rsi

- type: entity
  parent: [ClothingShoesBootsSlasher, BaseMajorContraband]
  id: ClothingShoesSlasherClown
  name: slasher's clown shoes
  description: Oversized clown shoes fit for a slasher.
  components:
  - type: ItemToggle
    activated: true
    onUse: false
    onActivate: false
    soundActivate:
      collection: BikeHorn
    soundDeactivate:
      collection: BikeHorn
      params:
        pitch: .8
  - type: ToggleClothing
    action: ActionToggleWaddling
  - type: WaddleWhenWorn
    waddlingAlert: Waddling
  - type: Sprite
    sprite: Clothing/Shoes/Specific/clown.rsi
  - type: Clothing
    sprite: Clothing/Shoes/Specific/clown.rsi
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepClown
      params:
        variation: 0.08
  - type: Tag
    tags:
    - ClownShoes
    - WhitelistChameleon

- type: entity
  parent: [MascotGriffyHead, BaseMajorContraband]
  id: ClothingHeadSlasherGriffy
  name: slasher's griffy head
  description: A slasher-altered griffy mascot head.
  components:
  - type: EquipmentHeater
    tempIncrease: 0 # this is used on the parent to make it increase body temp so we 0 it so it doesn't.

