  name: Slasher captain's jumpsuit
  description: A captain's jumpsuit torn and bloodied by repeated hunts.

- type: entity
  parent: [ClothingHandsGlovesCaptain, BaseMajorContraband]
  id: ClothingHandsGlovesSlasherCaptain
  name: bloody captain gloves
