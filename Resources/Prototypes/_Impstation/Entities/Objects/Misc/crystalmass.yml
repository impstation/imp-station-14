- type: entity
  id: CrystalMass
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  name: crystal mass
  description: You see this massive crystal mass looming towards you, cracking and screeching at every seemingly random movement.
  components:
    - type: Appearance
    - type: Transform
      anchored: true
    - type: Physics
    - type: CrystalMass
      spreadChance: 0.66
    - type: ActiveEdgeSpreader
    - type: EdgeSpreader
      id: CrystalMass
    - type: MeleeSound
      soundGroups:
        Brute:
          path:
            "/Audio/Weapons/slash.ogg"
    - type: Sprite
      sprite: _Impstation/Objects/Misc/crystal_mass.rsi
      state: crystal_cascade_1
      drawdepth: Overdoors
    - type: CrystalMassVisuals
    - type: Clickable
    - type: Fixtures
      fixtures:
        fix1:
          hard: false
          density: 7
          shape:
            !type:PhysShapeAabb
            bounds: "-0.5,-0.5,0.5,0.5"
          layer:
          - MidImpassable
