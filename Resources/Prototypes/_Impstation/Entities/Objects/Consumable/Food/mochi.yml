- type: entity
  name: mochi paste
  parent: FoodBakingBase
  id: FoodMochiPaste
  description: mochi, ready to shape!
  components:
  - type: FlavorProfile
    flavors:
      - rice
  - type: Sprite
    sprite: _Impstation/Objects/Consumable/Food
    state: mochi
  - type: SliceableFood
    count: 3
    slice: FoodMochiSlice

- type: entity
  name: mochi slice
  parent: FoodBakingBase
  id: FoodMochiSlice
  description: A slice of mochi. Can be used to make Daifuku or Dango.
  components:
  - type: FlavorProfile
    flavors:
      - rice
  - type: Sprite
    sprite: _Impstation/Objects/Consumable/Food
    state: mochi-slice


