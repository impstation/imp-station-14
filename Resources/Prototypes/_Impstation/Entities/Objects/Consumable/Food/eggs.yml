- type: entity
  abstract: true
  parent: FoodEggBase
  id: BaseGestatingEgg
  name: egg
  description: An egg!
  components:
  - type: Tag
    tags:
    - Egg
    - Meat
    - Incubated
  - type: Gestating
    deleteSelfOnSpawn: true
  - type: Incubatable

- type: entity
  parent: BaseGestatingEgg
  id: HenEgg
  name: hen egg
  components:
  - type: Sprite
    state: henEgg
    sprite: _Impstation/Objects/Consumable/Food/Ingredients/eggs.rsi
  - type: Gestating
    entityToSpawn: MobHenChick

- type: entity
  parent: BaseGestatingEgg
  id: RoosterEgg
  name: rooster egg
  components:
  - type: Sprite
    state: roosterEgg
    sprite: _Impstation/Objects/Consumable/Food/Ingredients/eggs.rsi
  - type: Gestating
    entityToSpawn: MobRoosterChick
