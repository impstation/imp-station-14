  components:
  - type: Sprite
    sprite: _Impstation/Objects/Consumable/Food/Baked/cake.rsi
    state: cotton-unfrosted-slice
  - type: Tag
    tags:
    - Cake
    - ClothMade
    - ClothFood
    - Slice
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: Nutriment
          Quantity: 4
        - ReagentId: Vitamin
          Quantity: 1
        - ReagentId: Fiber
          Quantity: 1
  - type: Item
    sprite: _Impstation/Objects/Consumable/Food/Baked/cake.rsi
    heldPrefix: cotton-unfrosted-slice
