- type: entity
  name: unfrosted cotton cake
  parent: FoodCakeBase
  id: FoodCakeCottonUnfrosted
  description: A cake made of fiber.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Consumable/Food/Baked/cake.rsi
    state: cotton-unfrosted
  - type: SliceableFood
    slice: FoodCakeCottonUnfrostedSlice
  - type: Tag
    tags:
    - Cake
    - ClothMade
    - ClothFood
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 55
        reagents:
        - ReagentId: Nutriment
          Quantity: 25
        - ReagentId: Vitamin
          Quantity: 5
        - ReagentId: Fiber
          Quantity: 5
  - type: Item
    sprite: _Impstation/Objects/Consumable/Food/Baked/cake.rsi
    heldPrefix: cotton-unfrosted
  - type: Construction
    graph: Cakes
    node: cottonCake

- type: entity
  name: slice of unfrosted cotton cake
