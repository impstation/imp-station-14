- type: entity
  parent: TrashBag
  id: TrashBagSlippery
  suffix: Slippery
  components:
  - type: Slippery
    slipData:
      knockdownTime: 3
      launchForwardsMultiplier: 2.0
  - type: StepTrigger
    intersectRatio: 0.2
  - type: CollisionWake
    enabled: false
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        hard: false
        layer:
        - SlipLayer
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        density: 5
        mask:
        - ItemMask

- type: entity
  parent: BaseItem
  id: MopSheath
  name: mop
  description: A mop that can't be stopped, viscera cleanup detail awaits.
  suffix: Sheath
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Specific/Janitorial/mop_sword_sheath.rsi
    layers:
    - state: mop
    - map: [ "enum.SolutionContainerLayers.Fill" ]
      state: fill-3
      visible: false
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: fill-
    inHandsFillBaseName: -fill-
    inHandsMaxFillLevels: 2
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 10
    soundHit:
      collection: MetalThud
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: [ ]
      item: !type:ContainerSlot { }
  - type: ItemSlots
    slots:
      item:
        name: sheath
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - MopSword
  - type: ItemMapper
    mapLayers:
      mop-sword:
        whitelist:
          tags:
          - MopSword
  - type: Spillable
    solution: absorbed
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 5
  - type: Item
    size: Large
    sprite: _Impstation/Objects/Specific/Janitorial/mop_sword_sheath.rsi
  - type: Absorbent
  - type: SolutionContainerManager
    solutions:
      absorbed:
        maxVol: 100
  - type: UseDelay
    delay: 1
  - type: PhysicalComposition
    materialComposition:
      Plastic: 50
  - type: Tag
    tags:
    - Mop
    - MopBasic
  - type: GuideHelp
    guides:
    - Janitorial
  - type: DnaSubstanceTrace

- type: entity
  id: MopSheathFilled
  parent: MopSheath
  suffix: Filled
  components:
  - type: ContainerFill
    containers:
      item:
      - MopSword

- type: entity
  name: mop sword
  parent: BaseSword
  id: MopSword
  description: A blade to deliver the cleanest kill this side of the universe.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Specific/Janitorial/mop_sword.rsi
    state: mopsword
  - type: MeleeWeapon
    attackRate: 1.5
    damage:
      types:
        Slash: 15
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Reflect
    reflectProb: .1
    spread: 90
  - type: Item
    sprite: _Impstation/Objects/Specific/Janitorial/mop_sword.rsi
  - type: Tag
    tags:
    - MopSword
