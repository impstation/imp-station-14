- type: entity
  parent: BaseItem
  id: BaseMMI
  save: false
  abstract: true
  name: organic-synthetic interface
  description: A machine able to facilitate communication between a biological brain and electronics, enabling crew to continue to provide value after work-related incidents. A first step towards a cyborg.
  components:
  - type: Sprite
    sprite: Objects/Specific/Robotics/mmi.rsi
    layers:
    - state: mmi_brain
      map: ["enum.MMIVisualLayers.Brain"]
      visible: false
    - state: mmi_off
      map: ["enum.MMIVisualLayers.Base"]
  - type: Input
    context: human
  - type: MMI
    brainSlot:
      name: positronic-brain-slot-component-slot-name-brain
      whitelist:
        components:
        - Brain
  - type: BorgBrain
  - type: BlockMovement
  - type: Examiner
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Binary
  - type: ActiveRadio
    channels:
    - Binary
    - Common
  - type: NameIdentifier
    group: MMI
  - type: DoAfter
  - type: Actions
  - type: TypingIndicator
    proto: robot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Borg
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      brain_slot: !type:ContainerSlot
  - type: Appearance
  - type: GuideHelp
    guides:
    - Cyborgs
    - Robotics
  - type: ChangeVoiceInContainer
    whitelist:
      components:
      - SecretStash
  - type: StatusEffects
    allowed:
    - Flashed
  - type: Vocal
    sounds:
      Unsexed: UnisexSilicon
    wilhelmProbability: 0
  - type: Tag
    tags:
    - SiliconEmotes
    - ImmobileEmoter
  - type: ActionGrant
    actions:
    - ActionDisconnect

- type: entity
  parent: BaseMMI
  id: XenoMMI
  name: sinister organic-synthetic interface # TODO: change this
  description: A machine able to facilitate communication between a biological brain and electronics, enabling crew to continue to provide value after work-related incidents. This one has a foreboding aura. # TODO: change this
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Specific/Robotics/xeno_mmi.rsi
    layers:
    - state: mmi_brain
      map: ["enum.MMIVisualLayers.Brain"]
      visible: false
    - state: mmi_off
      map: ["enum.MMIVisualLayers.Base"]

- type: entity
  parent: XenoMMI
  id: XenoMMIFilled
  suffix: Filled
  components:
  - type: MMI
    brainSlot:
      name: positronic-brain-slot-component-slot-name-brain
      startingItem: OrganHumanBrain
      whitelist:
        components:
        - Brain
  - type: Construction
    graph: XenoBrainDeconvert
    node: start
