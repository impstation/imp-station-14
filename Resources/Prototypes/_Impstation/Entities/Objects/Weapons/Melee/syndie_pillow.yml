- type: entity
  parent: BasePlushie
  id: SyndiePillow
  name: pillow
  description: A pillow
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Fun/Pillows/syndie_pillow.rsi
    state: pillow
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.25
    damage:
      types:
        Blunt: 1
    angle: 100
    soundHit:
      path: /Audio/Items/Toys/ToyFall2.ogg
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Items/Toys/ToyFall1.ogg
  - type: StaminaDamageOnHit
    damage: 10
  - type: Appearance
  - type: DisarmMalus
    malus: 0
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 5
        Structural: 5
        StaminaDamageOnHit: 8
  - type: UseDelay
    delay: 1
  - type: Item
    size: Normal
    storedSprite:
      state: pillow
      sprite: _Impstation/Objects/Fun/Pillows/syndie_pillow.rsi
    shape:
    - 0,0,2,2
  - type: Tag
    tags:
    - ClothMade
    - SyndiePillow

- type: entity
  parent: BasePlushie
  id: SyndieBodyPillow
  name: A body pillow
  description: You are sure to win the pillow fight with this one
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Fun/Pillows/syndie_bodypillow.rsi
    state: syndie-bodypillow
  - type: Item
    size: Large
    sprite: _Impstation/Objects/Fun/Pillows/syndie_bodypillow.rsi
    inhandVisuals:
      left:
      - state: syndie-body-pillow-inhand
      right:
      - state: syndie-body-pillow-inhand
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/Toys/ToyFall2.ogg
      params:
        pitch: 0.10
  - type: ThrowingAngle
    angle: 180
  - type: LandAtCursor
  - type: MeleeWeapon
    angle: 50
    wideAnimationRotation: -135
    attackRate: 4
    soundHit:
      path: /Audio/Items/Toys/ToyFall2.ogg
      params:
        pitch: 0.7
  - type: StaminaDamageOnHit
    damage: 20
  - type: Edible
    requiresSpecialDigestion: true
  - type: HeldSpeedModifier
    walkModifier: 0.3
    sprintModifier: 0.3
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 7
        Structural: 5
    soundHit: /Audio/Items/Toys/ToyFall2.ogg
    staminaCost: 20
  - type: MultiHandedItem
  - type: Construction
    graph: SyndieBodyPillow
    node: syndiebpillow
