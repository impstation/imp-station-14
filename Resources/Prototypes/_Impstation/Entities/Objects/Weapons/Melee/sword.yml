- type: entity
  parent: EnergyKatana
  id: EnergyKatanaStun
  suffix: stun
  description: A katana infused with strong energy. Few possess the strength to contain it.
  components:
  - type: StaminaDamageOnHit
    damage: 30
    sound: /Audio/Weapons/bladeslice.ogg
  - type: MeleeWeapon
    angle: 60
    animation: WeaponArcSlash
    wideAnimationRotation: -60
    damage:
      types:
        Slash: 5
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Slash: 30
    activatedSoundOnHit:
        path: /Audio/Weapons/bladeslice.ogg
    deactivatedSoundOnHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Stunbaton
    energyPerUse: 100
    inverted: true
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Melee/energykatana.rsi
    layers:
    - state: off-icon
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Item
    heldPrefix: off
    sprite: _Impstation/Objects/Weapons/Melee/energykatana.rsi
  - type: Clothing
    sprite: _Impstation/Objects/Weapons/Melee/energykatana.rsi
    quickEquip: false
    slots:
    - Back
    - Belt
  - type: ItemToggleDamageOtherOnHit
  - type: ItemToggle
    predictable: false
    soundActivate:
      collection: sparks
      params:
        variation: 0.250
    soundDeactivate:
      collection: sparks
      params:
        variation: 0.250
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
      params:
        variation: 0.250
  - type: UseDelay
  - type: Appearance
  - type: GenericVisualizer
    visuals:
     enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: on-icon}
          False: {state: off-icon}
  - type: Stamp
    stampedName: stamp-component-stamped-name-ninja
    stampedColor: "#21a52e"
    stampState: "paper_stamp-ninja"
  # Inherited
  # - type: EnergyKatana
  # - type: DashAbility
  # - type: LimitedCharges
  #   maxCharges: 3
  #   charges: 3
  # - type: AutoRecharge
  #   rechargeDuration: 20
  # - type: Reflect
  # - type: ThrowingAngle
  #   angle: 300

- type: entity
  parent: [BaseSword, BaseGrandTheftContraband]
  id: SwordHoSNodachi
  name: Head of Security Nodachi
  description: Placeholder.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Melee/hos_nodachi.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: power-unshaded-6
      map: [ "enum.GunVisualLayers.MagUnshaded" ]
      shader: unshaded
  - type: Item
    sprite: _Impstation/Objects/Weapons/Melee/hos_nodachi.rsi
    state: base
    size: Huge
    shape:
    - 0,0,9,0
  ## flashlight and battery
  - type: Appearance
  - type: MagazineVisuals # it seems a little weird to use MagazineVisuals on something that doesn't have a magazine but if it works it works.
    magState: power       # Someone tell me if there's a better way to do a power bar indicator
    steps: 7
    zeroVisible: false
  # - type: Battery       # not sure if I want this to have a power cell or an internal battery, I'll figure that out later
  #   maxCharge: 1050 # change these
  #   startingCharge: 1050
  - type: HandheldLight
    addPrefix: false
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour
        id: radiating
        maxDuration: 2.0
        startValue: 3.0
        endValue: 2.0
        isLooped: true
        reverseWhenFinished: true
      - !type:PulseBehaviour
        id: blinking
        interpolate: Nearest
        maxDuration: 1.0
        startValue: 0.1
        endValue: 2.0
        isLooped: true
  - type: ItemTogglePointLight
  - type: PowerCellSlot   # not sure if I want this to have a power cell or an internal battery, I'll figure that out later
    cellSlotId: cell_slot
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
  - type: PointLight
    color: "#ffeead" # hehe feed
    enabled: false
    radius: 4
    netsync: false
  ## weapon
  - type: MeleeWeapon
    attackRate: 1
    angle: 90
    range: 1.75
    damage:
      types:
        Slash: 15
        Piercing: 2
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 10
        Piercing: 3
  - type: DisarmMalus
  - type: DamageOtherOnHit
    staminaCost: 5
    damage:
      types:
        Piercing: 15
        Slash: 10
  - type: EmbeddableProjectile
  - type: EmbedPassiveDamage
  - type: ThrowingAngle
    angle: 225
