      - state: dart1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
      - state: batozinedart
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 10
        reagents:
        - ReagentId: Batozine
          Quantity: 10
  - type: SolutionInjectWhileEmbedded
    transferAmount: 10
    solution: injector
    updateInterval: 1
  - type: SolutionInjectOnEmbed
    transferAmount: 10