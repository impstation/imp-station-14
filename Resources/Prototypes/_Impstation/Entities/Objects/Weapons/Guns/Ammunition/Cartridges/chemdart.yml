- type: entity
  name: Tranquilizer Dart
  parent: [ BaseItem, BaseRestrictedZookeeperContraband ]
  description: A dart designed to be loaded into a tranquilizer rifle. This one contains the chemical Barbadine, which induces drowsiness, and works much more effectively on less mentally active creatures.
  id: TranqDart
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Weapons/Guns/Ammunition/Casings/chem_darts.rsi
    layers:
      - state: dart1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
      - state: tranqdart
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 6
        reagents:
        - ReagentId: Barbadine
          Quantity: 6
  - type: ExaminableSolution
    solution: injector
    exactVolume: true
  - type: TrashOnSolutionEmpty
    solution: injector
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - Dart
    - Trash
  - type: EmbeddableProjectile
    offset: "0,-0.05"
    minimumSpeed: 3
    removalTime: 0.25
    embedOnThrow: false
  - type: SolutionInjectWhileEmbedded
    transferAmount: 6
    solution: injector
    updateInterval: 1
  - type: SolutionInjectOnEmbed
    transferAmount: 6
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: dart
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.2
        density: 5
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.3,0.1,0.3"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
  - type: Projectile
    deleteOnCollide: false
    onlyCollideWhenShot: true
    damage:
      types:
        Piercing: 0.5

- type: entity
  parent: TranqDart
  id: IrwizineDart
  name: Irwizine Dart
  description: A dart designed to be loaded into a tranquilizer rifle. This one contains the chemical irwizine, which pacifies aggressive creatures, for when they can't be put to sleep. Only takes one shot to work.
  components:
  - type: Sprite
    layers:
      - state: dart1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
      - state: irwizinedart
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 10
        reagents:
        - ReagentId: Irwizine
          Quantity: 10
  - type: SolutionInjectWhileEmbedded
    transferAmount: 10
    solution: injector
    updateInterval: 1
  - type: SolutionInjectOnEmbed
    transferAmount: 10

