- type: entity
  parent: BaseScrap
  id: ScrapPlasticSlag
  name: plastic slag pile
  description: A pile of slag composed of fused steel and plastic. There's some usable material to be had here.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Materials/Scrap/generic.rsi
    layers:
    - state: plastic-slag
      map: [ "base" ]
  - type: Item
    size: Ginormous
    heldPrefix: metal
  - type: MultiHandedItem
  - type: PhysicalComposition
    materialComposition:
      Steel: 500 # 5 sheets
      Plastic: 2000 # 20 sheets

- type: entity
  parent: BaseScrap
  id: PigIronCorpse
  name: Worthless Pig Iron Artifact
  description: Some ancient piece of scrap, even at its prime it mustn't have been much to behold.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Materials/Scrap/generic.rsi
    layers:
      - state: pig-iron
        map: [ "base" ]
  - type: Item
    size: Large
    shape:
    - 0,0,4,4 # 5x5
    heldPrefix: metal
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 10
        reagents:
        - ReagentId: Vodka
          Quantity: 4.5
        - ReagentId: WeldingFuel
          Quantity: 4.5
        - ReagentId: Protein
          Quantity: 1
  - type: MultiHandedItem
  - type: PhysicalComposition
    materialComposition:
      RawIron: 500
      Plastic: 500
  - type: Spillable
    solution: beaker
  - type: DrainableSolution
    solution: beaker
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:SpillBehavior { }
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: StaticPrice
    price: 1
