- type: entity
  parent: ReinforcementRadio
  id: ReinforcementRadioGondal
  name: noise maker reinforcment
  description: Call in a tiny, but still very loud, gondal.
  components:
    - type: GhostRole
      name: "Decoy Gondal"
      description: "Sing your heart out and dont get caught!"
      rules: ghost-role-information-familiar-rules
      mindRoles:
      - MindRoleGhostRoleTeamAntagonist
      - MindRoleGhostRoleFamiliar
      raffle:
        settings: default
    - type: GhostRoleMobSpawner
      prototype: MobBabyGondal

- type: entity
  parent: TreasureCoinGold
  id: TreasureCoinGet
  components:
  - type: Sprite
    layers:
    - state: coin_gold
    - state: sparkle-1
    - state: sparkle-1
      shader: unshaded
  - type: StaticPrice
    price: 175
  - type: GetSign
  - type: Lubed
    slipStrength: 10
    slipsLeft: 200

- type: entity
  parent: [ BaseItem, Tier2Contraband]
  id: ContrabandHandLabeler
  name: blood-red hand labeler
  description: A syndicate hand labeler, used to label items as contraband.
  components:
    - type: Sprite
      sprite: Objects/Tools/hand_labeler.rsi
      state: hand_labeler
    - type: Item
      sprite: Objects/Tools/hand_labeler.rsi
      storedRotation: -90
    - type: TargetAction
      range: 2
      interactOnMiss: false
    - type: EntityTargetAction
      event: !type:ChangeComponentsSpellEvent
        toAdd:
        - type: Contraband
          severity: HighlyIllegal
