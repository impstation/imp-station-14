    children:
    - id: BoxEncryptionKeyService
    - id: ClothingBeltHospitalityDirectorFilled
    - id: ClothingHeadsetAltService
    - id: ClothingShoesGaloshes
    - id: DoorRemoteService
    - id: PortableCutterMachineFolded
    - id: RubberStampHD
    - id: PersonalAILearnerService
    - id: ClothingNeckCloakBlanketShock
    - id: ComputerServiceJobBoardFlatpack

- type: entity
