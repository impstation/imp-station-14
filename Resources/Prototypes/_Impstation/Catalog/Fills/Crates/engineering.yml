- type: entity
  id: CrateEvaEngineeringKit
  parent: CrateEngineeringSecure
  name: engineering EVA kit
  description: A set consisting of two shiny EVA suits and helmets in engineering colors.
  components:
  - type: StorageFill
    contents:
      - id: ClothingHeadHelmetEVAEngineering
        amount: 2
      - id: ClothingOuterHardsuitEVAEngineering
        amount: 2

- type: entity
  id: CrateEngineeringSupermatter
  parent: [ CrateEngineeringSecure, BaseRestrictedChiefEngineerContraband ]
  name: supermatter shard crate
  description: A specialized crate immune to the supermatter, containing a supermatter shard. Personal protective equipment is recommended for transport. Requires Chief Engineer access to open.
  components:
  - type: Icon
    sprite: _Impstation/Structures/Storage/Crates/supermatter.rsi
  - type: Sprite
    sprite: _Impstation/Structures/Storage/Crates/supermatter.rsi
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: SupermatterShard
  - type: AccessReader
    access: [ [ "ChiefEngineer" ] ]
  - type: AntiTamper
    containers: [ entity_storage ]
  - type: SupermatterImmune
