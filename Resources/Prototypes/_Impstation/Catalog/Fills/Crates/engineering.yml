- type: entity
  id: CrateEvaEngineeringKit
  parent: CrateEngineeringSecure
  name: engineering EVA kit
  description: A set consisting of two shiny EVA suits and helmets in engineering colors.
  components:
  - type: StorageFill
    contents:
      - id: ClothingHeadHelmetEVAEngineering
        amount: 2
      - id: ClothingOuterHardsuitEVAEngineering
        amount: 2

- type: entity
  parent: CrateEngineeringSecure
  id: CrateRPD
  name: RPD crate
  description: A crate containing a single rapid piping device.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage:
        id: RPD

- type: entity
  id: CrateEngineeringSupermatterShard
  parent: CrateEngineeringSupermatterSecure
  name: supermatter shard crate
  description: A specialized crate immune to the supermatter that contains a supermatter shard. Requires Engineering access to open.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: SupermatterShard
  - type: AntiTamper
    containers: [ entity_storage ]
