- type: antag
  id: Slasher
  name: roles-antag-slasher-name
  antagonist: true
  setPreference: true
  playTimeTracker: AntagSlasher
  objective: roles-antag-slasher-objective
  guides: [ ]
  requirements: # Requiring some sec playtime, mainly to ensure people know escalation rules
  - !type:DepartmentTimeRequirement
    department: Security
    time: 5h

- type: startingGear
  id: SlasherGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitSlasher
    mask: ClothingMaskSlasher
    back: ClothingBackpackSatchel
    ears: ClothingHeadsetSlasher
    gloves: ClothingHandsGlovesSlasher
    outerClothing: ClothingOuterCoatSlasher
    shoes: ClothingShoesBootsSlasher
    id: SlasherPDA
    pocket1: PinpointerSlasherEffigy
  inhand:
  - SlasherGearContainer
  storage:
    back:
    - SlasherChainsaw
    - SlasherKnife
    - SlasherHatchet

- type: startingGear
  id: SlasherGearClown
  parent: SlasherGear
  equipment:
    gloves: ClothingHandsGlovesSlasherClown
    mask: ClothingMaskSlasherClown
    jumpsuit: ClothingUniformJumpsuitSlasherClown
    outerClothing: ClothingOuterCoatSlasherClown
    shoes: ClothingShoesSlasherClown

- type: startingGear
  id: SlasherGearGriffy
  parent: SlasherGear
  equipment:
    head: ClothingHeadSlasherGriffy
    outerClothing: ClothingOuterSlasherGriffy
    id: SlasherGriffyPDA

- type: startingGear
  id: SlasherGearCaptain
  parent: SlasherGear
  equipment:
    head: ClothingHeadHatSlasherCaptain
    outerClothing: ClothingOuterArmorSlasherCaptainCarapace
    jumpsuit: ClothingUniformJumpsuitSlasherCaptain
    gloves: ClothingHandsGlovesSlasherCaptain
    shoes: ClothingShoesBootsSlasherCaptain
