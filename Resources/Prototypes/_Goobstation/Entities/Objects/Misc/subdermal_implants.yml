- type: entity
  parent: BaseSubdermalImplant
  id: BluespaceLifelineImplant
  name: bluespace lifeline implant
  description: Teleports the hosts body to Central Command on activation. They will not be able to return.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    permanent: true
    implantAction: ActionActivateBluespaceLifeline
  # - type: MansusGraspBlockTrigger Imp
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: TriggerOnActivateImplant
  # - type: DeleteParentOnTrigger Imp
  # Imp start
  - type: DeleteOnTrigger
    targetUser: true
  # Imp end
  - type: SpawnOnTrigger
    proto: BluespaceLifelineSpawnCore
  - type: Tag
    tags:
    - SubdermalImplant
    - HideContextMenu

- type: entity
  parent: BaseSubdermalImplant
  id: RedspaceLifelineImplant
  name: redspace lifeline implant
  description: Teleports the hosts body to Syndicate High Command on activation. They will not be able to return.
  categories: [ HideSpawnMenu ]
  components:
    - type: SubdermalImplant
      permanent: true
      implantAction: ActionActivateRedspaceLifeline
    # - type: MansusGraspBlockTrigger Imp
    - type: TriggerOnMobstateChange
      mobState:
        - Dead
    - type: TriggerOnActivateImplant
    # - type: DeleteParentOnTrigger Imp
    # Imp start
    - type: DeleteOnTrigger
      targetUser: true
    # Imp end
    - type: SpawnOnTrigger
      proto: RedspaceLifelineSpawnCore
    - type: Tag
      tags:
        - SubdermalImplant
        - HideContextMenu
